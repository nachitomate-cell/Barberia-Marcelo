<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAFAFA">
  <title>Barbería Premium | Inicio</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Phosphor Icons (Minimalist elegant icons) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#FAFAFA',
              text: '#111827',
              accent: '#10B981',
              accentDark: '#047857'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'fade-slide-up': 'fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeSlideUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #FAFAFA;
      color: #111827;
      /* Prevent pull-to-refresh on mobile for a more app-like feel */
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Glassmorphism for Navbar */
    .glass-nav {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    /* Animation Delays for staggered entrance */
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen pb-32 selection:bg-brand-accent selection:text-white">

  <main class="px-6 pt-12 max-w-md mx-auto">
    <!-- Header Section -->
    <header class="flex justify-between items-center mb-10 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards]">
      <div>
        <p class="text-sm text-gray-500 font-medium mb-1">Buenos días,</p>
        <h1 class="text-3xl font-bold tracking-tight text-brand-text">Hola, Matías</h1>
      </div>
      <div class="relative">
        <img src="https://i.pravatar.cc/150?u=matias" alt="Avatar Usuario" class="w-14 h-14 rounded-full object-cover shadow-sm ring-4 ring-white">
        <!-- Online/Notification Badge -->
        <div class="absolute bottom-0 right-0 w-4 h-4 bg-brand-accent rounded-full border-[3px] border-white"></div>
      </div>
    </header>

    <!-- Quick Action / Repetir Corte -->
    <section class="mb-10 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-100">
      <button class="w-full relative overflow-hidden rounded-[2rem] bg-white p-6 shadow-lg shadow-gray-200/50 border border-gray-100 flex items-center gap-5 group transition-all duration-300 hover:shadow-xl hover:-translate-y-1 active:scale-[0.98] active:translate-y-0 text-left">
        <!-- Hover Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-br from-brand-accent/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        
        <!-- Icon Container -->
        <div class="w-16 h-16 flex items-center justify-center rounded-full bg-gradient-to-br from-brand-accent to-brand-accentDark text-white shadow-md shadow-brand-accent/30 shrink-0 transform group-hover:scale-105 transition-transform duration-300">
          <i class="ph ph-scissors text-3xl"></i>
        </div>
        
        <!-- Text -->
        <div class="flex-1">
          <h2 class="text-lg font-bold text-brand-text mb-1 group-hover:text-brand-accentDark transition-colors">Repetir mi último corte</h2>
          <p class="text-sm text-gray-500 font-medium">Fade + Perfilado de barba</p>
        </div>
        
        <!-- Chevron -->
        <div class="text-gray-300 group-hover:text-brand-accent transition-colors transform group-hover:translate-x-1 duration-300 shrink-0">
          <i class="ph-bold ph-caret-right text-xl"></i>
        </div>
      </button>
    </section>

    <!-- Próximas Citas -->
    <section class="opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-200">
      <div class="flex justify-between items-end mb-6">
        <h2 class="text-xl font-bold text-brand-text tracking-tight">Próximas Citas</h2>
        <a href="#" class="text-sm font-semibold text-brand-accent hover:text-brand-accentDark transition-colors">Ver todas</a>
      </div>

      <div class="space-y-4">
        <!-- Tarjeta de Cita 1 (Confirmada) -->
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100/80 flex flex-col gap-4 relative overflow-hidden transition-shadow hover:shadow-md">
          <!-- Borde izquierdo decorativo -->
          <div class="absolute top-0 left-0 w-1.5 h-full bg-brand-accent"></div>
          
          <div class="flex justify-between items-start pl-2">
            <div class="flex gap-4">
              <!-- Calendario Date -->
              <div class="flex flex-col items-center justify-center bg-brand-bg rounded-2xl w-14 h-16 border border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">OCT</span>
                <span class="text-xl font-bold text-brand-text leading-none mt-1">14</span>
              </div>
              
              <!-- Info -->
              <div>
                <div class="flex items-center gap-2.5 mb-1.5">
                  <h3 class="font-bold text-brand-text text-base">Corte Clásico</h3>
                  <!-- Indicador Cita Confirmada (Punto Verde Brillante) -->
                  <span class="flex h-2.5 w-2.5 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-accent opacity-60"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-accent shadow-[0_0_8px_rgba(16,185,129,0.6)]"></span>
                  </span>
                </div>
                <p class="text-sm text-gray-500 flex items-center gap-1.5 font-medium">
                  <i class="ph-fill ph-clock text-gray-400 text-base"></i> 16:30 - 17:15
                </p>
              </div>
            </div>
            
            <!-- Precio -->
            <div class="text-right">
              <span class="font-bold text-lg text-brand-text">$15.000</span>
            </div>
          </div>
          
          <!-- Barbero Detail & Actions -->
          <div class="flex items-center justify-between pt-3.5 border-t border-gray-50 mt-1 pl-2">
             <div class="flex items-center gap-3">
               <img src="https://i.pravatar.cc/150?u=alejandro" alt="Barbero" class="w-7 h-7 rounded-full bg-gray-100 object-cover ring-2 ring-white">
               <span class="text-xs font-medium text-gray-500">Con <span class="font-bold text-brand-text">Alejandro</span></span>
             </div>
             <button onclick="openCancelSheet()" class="text-[11px] font-bold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg active:scale-95 transition-all outline-none">
               Cancelar
             </button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- Bottom Navigation Bar (Floating & Glassmorphism) -->
  <div class="fixed bottom-6 left-0 right-0 px-6 max-w-md mx-auto z-50 opacity-0 animate-[fadeSlideUp_0.6s_cubic-bezier(0.16,1,0.3,1)_forwards] delay-300">
    <nav class="glass-nav rounded-[2rem] px-6 py-4 flex justify-between items-center shadow-xl shadow-gray-200/40">
      <!-- Item: Inicio (Activo) -->
      <a href="index.html" class="flex flex-col items-center gap-1.5 text-brand-accent group">
        <div class="relative">
          <i class="ph-fill ph-house text-2xl group-active:scale-95 transition-transform"></i>
          <!-- Indicador inferior de sección activa -->
          <span class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-1.5 h-1.5 bg-brand-accent rounded-full"></span>
        </div>
        <span class="text-[10px] font-bold">Inicio</span>
      </a>
      
      <!-- Item: Reservar -->
      <a href="reservar.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-calendar-plus text-2xl group-hover:scale-105 group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Reservar</span>
      </a>
      
      <!-- Item: Lookbook -->
      <a href="lookbook.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-images text-2xl group-hover:scale-105 group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Lookbook</span>
      </a>
      
      <!-- Item: Perfil -->
      <a href="gestion-interna.html" class="flex flex-col items-center gap-1.5 text-gray-400 hover:text-brand-text transition-colors group">
        <i class="ph ph-user text-2xl group-hover:scale-105 group-active:scale-95 transition-transform"></i>
        <span class="text-[10px] font-semibold">Admin</span>
      </a>
    </nav>
  </div>

  <!-- ================= BOTTOM SHEET CANCELAR CITA ================= -->
  
  <!-- Backdrop -->
  <div id="cancelBackdrop" class="fixed inset-0 bg-[#111827]/40 backdrop-blur-[2px] z-50 opacity-0 pointer-events-none transition-opacity duration-300 ease-out" onclick="closeCancelSheet()"></div>
  
  <!-- Panel Bottom Sheet -->
  <div id="cancelSheet" class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-[2rem] pt-3 px-6 pb-8 z-50 transform translate-y-full transition-transform duration-500 shadow-[0_-15px_40px_rgba(0,0,0,0.12)]" style="transition-timing-function: cubic-bezier(0.175, 0.885, 0.32, 1.15);">
    
    <!-- Drag Handle -->
    <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 cursor-pointer" onclick="closeCancelSheet()"></div>
    
    <div class="flex flex-col items-center text-center px-2">
      <!-- Ícono de advertencia -->
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mb-5 shrink-0">
         <i class="ph-fill ph-warning-circle text-4xl text-red-500"></i>
      </div>
      
      <h3 class="text-2xl font-bold text-brand-text mb-2 tracking-tight">¿Cancelar cita?</h3>
      <p class="text-[14px] text-gray-500 mb-8 leading-relaxed">Esta acción no se puede deshacer. Tu cupo de las 16:30 quedará libre para otro cliente.</p>
      
      <!-- Botones Stacked -->
      <div class="w-full flex flex-col gap-3">
          <!-- Destructive Button -->
          <button onclick="confirmCancel()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-4 rounded-full active:scale-[0.98] transition-all flex items-center justify-center gap-2 outline-none">
             Sí, cancelar cita
          </button>
          <!-- Ghost Button -->
          <button onclick="closeCancelSheet()" class="w-full bg-transparent hover:bg-gray-50 text-gray-500 font-bold py-4 rounded-full active:scale-[0.98] transition-all outline-none">
             No, mantener cita
          </button>
      </div>
    </div>
  </div>

  <script>
    function openCancelSheet() {
        document.getElementById('cancelBackdrop').classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('cancelSheet').classList.remove('translate-y-full');
    }

    function closeCancelSheet() {
        document.getElementById('cancelBackdrop').classList.add('opacity-0', 'pointer-events-none');
        document.getElementById('cancelSheet').classList.add('translate-y-full');
    }

    function confirmCancel() {
        closeCancelSheet();
        setTimeout(() => {
           alert("Cita cancelada correctamente.");
           // Lógica realista: document.getElementById('citaContainer').remove();
        }, 300);
    }
  </script>
</body>
</html>
