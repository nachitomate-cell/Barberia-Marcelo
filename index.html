<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FAFAFA">
  <title>Agendar Hora | Barbería Premium</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="db.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              bg: '#FAFAFA',
              text: '#111827',
              accent: '#10B981',
              accentDark: '#047857'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'fade-slide-up': 'fadeSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeSlideUp: {
              '0%': { opacity: '0', transform: 'translateY(24px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #FAFAFA;
      color: #111827;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen pb-32">

  <div class="max-w-md mx-auto relative overflow-hidden">
    
    <header class="px-6 pt-10 pb-4 flex items-center justify-between sticky top-0 bg-[#FAFAFA]/90 backdrop-blur-md z-40">
      <button onclick="goBack()" class="w-11 h-11 flex items-center justify-center rounded-full bg-white border border-gray-200 shadow-sm active:scale-95 transition-transform text-brand-text">
        <i class="ph-bold ph-arrow-left text-xl"></i>
      </button>
      <div class="flex items-center gap-2">
        <img src="logo.png" alt="Marcelo Hairdressing" class="h-10 w-10 rounded-full object-cover border border-gray-100 shadow-sm">
        <h1 class="text-xl font-bold tracking-tight text-brand-text">Marcelo Hairdressing</h1>
      </div>
      <div class="w-11"></div>
    </header>

    <div class="px-6 mb-8 pt-1 animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">
      <div class="flex justify-between items-end mb-2.5">
        <span id="stepIndicatorText" class="text-xs font-bold text-brand-accent uppercase tracking-widest">Paso 1 de 3: Servicios</span>
        <span id="progressPercentage" class="text-xs font-bold text-gray-400">33%</span>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-1.5 overflow-hidden">
        <div id="progressBar" class="bg-brand-accent h-1.5 rounded-full transition-all duration-700 w-1/3 relative"></div>
      </div>
    </div>

    <main class="px-6 pb-20 relative min-h-[500px]">

      <!-- PASO 1 -->
      <section id="step1" class="animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">
        <h2 class="text-2xl font-bold mb-6 text-brand-text tracking-tight">¿Qué servicio buscas?</h2>
        <div class="grid grid-cols-2 gap-4" id="servicesGrid">
        </div>
      </section>

      <!-- PASO 2 -->
      <section id="step2" class="hidden opacity-0 transform translate-x-12">
        <h2 class="text-2xl font-bold mb-6 text-brand-text tracking-tight">Selecciona fecha y hora</h2>
        
        <div class="mb-8">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-semibold text-gray-800 text-lg" id="currentMonthText"></h3>
          </div>
          <div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar -mx-6 px-6 scroll-smooth" id="calendarCarousel">
             <!-- Días Dinámicos -->
          </div>
        </div>

        <div>
          <h3 class="font-semibold text-gray-800 text-lg mb-4">Horas Disponibles</h3>
          <div class="flex flex-wrap gap-2.5" id="hoursGrid">
          </div>
        </div>
      </section>

      <!-- PASO 3 -->
      <section id="step3" class="hidden opacity-0 transform translate-x-12">
        <h2 class="text-2xl font-bold text-brand-text tracking-tight mb-2">Último paso</h2>
        <p class="text-[14px] text-gray-500 mb-8 leading-relaxed">Ingresa tus datos para confirmar la reserva a tu nombre.</p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nombre completo</label>
                <input type="text" id="clientName" placeholder="Ej. Ignacio Mateluna" class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 text-brand-text font-medium focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-all shadow-sm">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Teléfono móvil</label>
                <input type="tel" id="clientPhone" placeholder="+56 9 1234 5678" class="w-full bg-white border border-gray-200 rounded-2xl px-5 py-4 text-brand-text font-medium focus:outline-none focus:border-brand-accent focus:ring-1 focus:ring-brand-accent transition-all shadow-sm">
            </div>
        </div>

        <div class="mt-8 bg-gray-50 border border-gray-100 rounded-2xl p-5 shadow-inner">
            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Resumen de Cita</h4>
            <div class="flex justify-between items-center mb-1">
                <span class="font-bold text-brand-text" id="summaryService"></span>
                <span class="font-bold text-brand-accent" id="summaryPrice"></span>
            </div>
            <div class="flex items-center gap-1.5 text-sm text-gray-500 font-medium mt-2">
                <i class="ph-fill ph-calendar-blank text-gray-400"></i> <span id="summaryDateString"></span>, <span id="summaryTime" class="text-brand-text font-bold"></span>
            </div>
        </div>
      </section>

    </main>
  </div>

  <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-brand-bg via-brand-bg/95 to-transparent z-40">
    <div class="max-w-md mx-auto">
      <button id="btnContinue" onclick="nextStep()" class="w-full bg-brand-text text-white text-lg font-bold py-4 rounded-[2rem] shadow-xl shadow-brand-text/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2 focus:outline-none disabled:opacity-50 disabled:pointer-events-none">
        Continuar <i class="ph-bold ph-arrow-right text-xl"></i>
      </button>
    </div>
  </div>

  <script>
    let currentStep = 1;
    let selectedServiceObj = null;
    let selectedTimeStr = null;
    let currentDateStr = ""; 
    let isTransitioning = false;
    
    function initServices() {
        const services = DB.getServices();
        const grid = document.getElementById('servicesGrid');
        
        const icons = {
            1: 'ph-scissors', 2: 'ph-mask-happy',
            3: 'ph-user-focus', 4: 'ph-magic-wand'
        };

        grid.innerHTML = '';
        services.forEach(s => {
            const icon = icons[s.id] || 'ph-scissors';
            grid.innerHTML += `
            <button onclick="selectService(this)" data-service-id="${s.id}" class="service-option flex flex-col items-center justify-center p-6 rounded-2xl bg-white border-2 border-gray-100 shadow-sm hover:border-gray-200 active:scale-95 text-center transition-all">
                <div class="icon-bg w-14 h-14 rounded-full bg-gray-50 flex items-center justify-center mb-4 transition-colors">
                  <i class="icon-svg ph ${icon} text-3xl text-gray-600 transition-colors"></i>
                </div>
                <span class="font-semibold text-brand-text text-sm mb-1">${s.nombre}</span>
                <span class="text-xs font-medium text-gray-500 price-tag transition-colors">$${s.precio.toLocaleString('es-CL')}</span>
            </button>`;
        });
    }

    function renderCalendar() {
        const carousel = document.querySelector('#calendarCarousel');
        carousel.innerHTML = '';
        const today = new Date(); 
        const settings = DB.getSettings();
        
        const daysOfWeek = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
        const months = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        document.getElementById('currentMonthText').innerText = `${months[today.getMonth()]} ${today.getFullYear()}`;
        
        let firstSelectableSet = false;

        for(let i=0; i<14; i++) {
           let d = new Date(today);
           d.setDate(today.getDate() + i);
           
           let m = (d.getMonth()+1).toString().padStart(2, '0');
           let dayStr = d.getDate().toString().padStart(2, '0');
           let dateStr = `${d.getFullYear()}-${m}-${dayStr}`;
           
           let dw = d.getDay();
           let disabled = !settings.diasLaborales.includes(dw);
           
           if(disabled) {
              carousel.innerHTML += `<button class="day-btn flex-shrink-0 w-16 h-[5.5rem] rounded-2xl bg-gray-50 border border-transparent flex flex-col items-center justify-center text-center opacity-40 pointer-events-none">
                <span class="text-[11px] font-semibold text-gray-400 uppercase tracking-wide mb-1">${daysOfWeek[dw]}</span>
                <span class="text-2xl font-bold text-gray-400 day-num">${d.getDate()}</span>
              </button>`;
           } else {
              let activeClass = !firstSelectableSet ? 'active bg-brand-text text-white shadow-lg shadow-gray-400/30' : 'bg-white border-gray-100 shadow-sm text-brand-text';
              let textSpan1 = !firstSelectableSet ? 'text-white opacity-70' : 'text-gray-500';
              let textSpan2 = !firstSelectableSet ? 'text-white' : 'text-brand-text';
              let dotClass = !firstSelectableSet ? 'bg-brand-accent shadow-[0_0_8px_rgba(16,185,129,0.8)]' : 'bg-transparent';
              
              if(!firstSelectableSet) {
                  currentDateStr = dateStr;
                  firstSelectableSet = true;
              }

              carousel.innerHTML += `<button onclick="handleDayClick(this, '${dateStr}')" class="day-btn ${activeClass} flex-shrink-0 w-16 h-[5.5rem] rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95 cursor-pointer border">
                <span class="text-[11px] font-semibold uppercase tracking-wide mb-1 ${textSpan1}">${daysOfWeek[dw]}</span>
                <span class="text-2xl font-bold ${textSpan2} day-num">${d.getDate()}</span>
                <div class="dot h-1.5 w-1.5 rounded-full mt-1.5 ${dotClass}"></div>
              </button>`;
           }
        }
    }

    function handleDayClick(btn, dateStr) {
        document.querySelectorAll('.day-btn:not(.pointer-events-none)').forEach(b => {
             b.classList.remove('active', 'bg-brand-text', 'text-white', 'shadow-lg', 'shadow-gray-400/30');
             b.classList.add('bg-white', 'border-gray-100', 'shadow-sm', 'text-brand-text');
             
             let spans = b.querySelectorAll('span');
             spans[0].className = "text-[11px] font-semibold uppercase tracking-wide mb-1 text-gray-500";
             spans[1].className = "text-2xl font-bold text-brand-text day-num";
             b.querySelector('.dot').className = 'dot h-1.5 w-1.5 rounded-full mt-1.5 bg-transparent';
        });
        
        btn.classList.add('active', 'bg-brand-text', 'text-white', 'shadow-lg', 'shadow-gray-400/30');
        btn.classList.remove('bg-white', 'border-gray-100', 'shadow-sm', 'text-brand-text');
        
        let spans = btn.querySelectorAll('span');
        spans[0].className = "text-[11px] font-semibold uppercase tracking-wide mb-1 text-white opacity-70";
        spans[1].className = "text-2xl font-bold text-white day-num";
        btn.querySelector('.dot').className = 'dot h-1.5 w-1.5 rounded-full mt-1.5 bg-brand-accent shadow-[0_0_8px_rgba(16,185,129,0.8)]';

        currentDateStr = dateStr;
        selectedTimeStr = null; 
        renderHours(); 
    }

    function renderHours() {
        if(!selectedServiceObj) return;

        const hours = DB.getAvailableHours(currentDateStr, selectedServiceObj.duracion);
        const grid = document.getElementById('hoursGrid');
        grid.innerHTML = '';
        
        if(hours.length === 0) {
            grid.innerHTML = `<p class="text-sm text-gray-500">No hay horas disponibles este día.</p>`;
            return;
        }

        hours.forEach(h => {
             if (h.occupied) {
                 grid.innerHTML += `<button class="px-6 py-2.5 rounded-full border border-transparent bg-gray-100 text-[15px] font-medium text-gray-400 line-through pointer-events-none opacity-60">${h.time}</button>`;
             } else {
                 grid.innerHTML += `<button onclick="selectTime(this, '${h.time}')" class="time-pill px-6 py-2.5 rounded-full border border-gray-200 bg-white shadow-sm text-[15px] font-semibold text-gray-700 transition-all active:scale-95 hover:border-gray-300 focus:outline-none">${h.time}</button>`;
             }
        });
    }

    function selectService(btn) {
        // Leer el ID desde el atributo data (siempre string → convertir a número para match exacto)
        const rawId = btn.getAttribute('data-service-id');
        const id = parseInt(rawId) || rawId; // Si era Date.now() es número grande; si es 1-4 default también

        document.querySelectorAll('.service-option').forEach(el => {
            el.classList.replace('border-brand-accent', 'border-gray-100');
            el.classList.remove('bg-emerald-50', 'scale-105', 'shadow-md');
            el.querySelector('.icon-bg').classList.replace('bg-white', 'bg-gray-50');
            el.querySelector('.icon-svg').classList.replace('text-brand-accent', 'text-gray-600');
            el.querySelector('.price-tag').classList.replace('text-brand-accent', 'text-gray-500');
        });
        
        btn.classList.replace('border-gray-100', 'border-brand-accent');
        btn.classList.add('bg-emerald-50', 'scale-105', 'shadow-md');
        btn.querySelector('.icon-bg').classList.replace('bg-gray-50', 'bg-white');
        btn.querySelector('.icon-svg').classList.replace('text-gray-600', 'text-brand-accent');
        btn.querySelector('.price-tag').classList.replace('text-gray-500', 'text-brand-accent');
        
        // Comparar como número o cadena según el ID almacenado
        selectedServiceObj = DB.getServices().find(s => String(s.id) === String(id));
    }

    function selectTime(btn, time) {
        document.querySelectorAll('.time-pill').forEach(el => {
            el.classList.remove('bg-brand-accent', 'text-white', 'border-transparent', 'shadow-md');
            el.classList.add('bg-white', 'text-gray-700', 'border-gray-200');
        });
        
        btn.classList.remove('bg-white', 'text-gray-700', 'border-gray-200');
        btn.classList.add('bg-brand-accent', 'text-white', 'border-transparent', 'shadow-md');
        selectedTimeStr = time;
    }

    function goBack() {
        if(currentStep === 1) return;
        else {
           const currentStepEl = document.getElementById(`step${currentStep}`);
           const prevStepEl = document.getElementById(`step${currentStep-1}`);
           
           currentStepEl.classList.add('opacity-0', 'translate-x-12');
           setTimeout(() => {
               currentStepEl.classList.add('hidden');
               prevStepEl.classList.remove('hidden');
               void prevStepEl.offsetWidth;
               prevStepEl.classList.remove('opacity-0', '-translate-x-12');
               currentStep--;
               updateProgress();
               
               let btn = document.getElementById('btnContinue');
               if(currentStep === 1 || currentStep === 2) {
                   btn.innerHTML = 'Continuar <i class="ph-bold ph-arrow-right text-xl"></i>';
                   btn.classList.replace('bg-brand-accent', 'bg-brand-text');
               }
           }, 300);
        }
    }

    function updateProgress() {
        const bar = document.getElementById('progressBar');
        const percentage = currentStep === 1 ? '33%' : (currentStep === 2 ? '66%' : '100%');
        const textStates = ["Paso 1 de 3: Servicios", "Paso 2 de 3: Fecha y Hora", "Paso 3 de 3: Confirmación"];
        
        bar.style.width = percentage;
        document.getElementById('progressPercentage').innerText = percentage;
        document.getElementById('stepIndicatorText').innerText = textStates[currentStep-1];
    }

    function nextStep() {
        if (isTransitioning) return;
        if (currentStep === 1) {
            if (!selectedServiceObj) return alert("Selecciona un servicio.");
            
            renderCalendar();
            renderHours();
            
            transitionStep(1, 2);
            currentStep = 2;
            updateProgress();
            
        } else if (currentStep === 2) {
            if (!selectedTimeStr) return alert("Selecciona una hora disponible.");
            
            document.getElementById('summaryService').innerText = selectedServiceObj.nombre;
            document.getElementById('summaryPrice').innerText = "$" + selectedServiceObj.precio.toLocaleString('es-CL');
            document.getElementById('summaryDateString').innerText = currentDateStr;
            document.getElementById('summaryTime').innerText = selectedTimeStr;
            
            transitionStep(2, 3);
            currentStep = 3;
            updateProgress();
            
            let btn = document.getElementById('btnContinue');
            btn.innerHTML = 'Reservar ahora <i class="ph-bold ph-check-circle text-xl"></i>';
            btn.classList.replace('bg-brand-text', 'bg-brand-accent');
            
        } else if (currentStep === 3) {
            const nombre = document.getElementById('clientName').value;
            const tel = document.getElementById('clientPhone').value;
            
            if(!nombre || !tel) return alert("Por favor ingresa tus datos para la reserva.");
            
            DB.saveBooking({
                fecha: currentDateStr,
                hora: selectedTimeStr,
                clienteNombre: nombre,
                clienteTelefono: tel,
                servicioNombre: selectedServiceObj.nombre,
                duracionServicio: selectedServiceObj.duracion
            });
            
            document.getElementById('step3').innerHTML = `
               <div class="flex flex-col items-center justify-center text-center pt-10 animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]">
                  <div class="w-20 h-20 bg-emerald-50 rounded-full flex items-center justify-center mb-6">
                     <i class="ph-fill ph-check-circle text-5xl text-brand-accent"></i>
                  </div>
                  <h2 class="text-3xl font-bold text-brand-text tracking-tight mb-2">¡Cita Confirmada!</h2>
                  <p class="text-gray-500 font-medium">Te esperamos el ${currentDateStr} a las ${selectedTimeStr}.</p>
               </div>
            `;
            document.getElementById('btnContinue').innerHTML = 'Volver al inicio <i class="ph-bold ph-house text-xl"></i>';
            document.getElementById('btnContinue').onclick = () => window.location.reload();
        }
    }

    function transitionStep(oldI, newI) {
        if (isTransitioning) return;
        isTransitioning = true;
        
        const oldEl = document.getElementById(`step${oldI}`);
        const newEl = document.getElementById(`step${newI}`);
        const btn = document.getElementById('btnContinue');
        
        btn.disabled = true;
        
        // Remover clases de animación de entrada del elemento que se va a ocultar
        oldEl.classList.remove('animate-[fadeSlideUp_0.5s_cubic-bezier(0.16,1,0.3,1)_forwards]');
        
        // Fase 1: Ocultar el actual
        oldEl.classList.add('opacity-0', 'transition-all', 'duration-300', '-translate-x-12');
        
        setTimeout(() => {
            oldEl.classList.add('hidden');
            oldEl.classList.remove('opacity-0', '-translate-x-12', 'transition-all', 'duration-300');
            
            // Fase 2: Mostrar el nuevo
            newEl.classList.remove('hidden');
            newEl.classList.add('opacity-0', 'translate-x-12');
            void newEl.offsetWidth; 
            
            newEl.classList.add('transition-all', 'duration-500', 'ease-out');
            newEl.classList.remove('opacity-0', 'translate-x-12');
            
            setTimeout(() => {
                isTransitioning = false;
                btn.disabled = false;
            }, 500);
        }, 300);
    }
    
    window.addEventListener('DOMContentLoaded', initServices);

  </script>
</body>
</html>
