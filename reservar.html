<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reservar Cita | Barbería</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="db.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { bg: '#FAFAFA', text: '#111827', accent: '#10B981' } } } }
    }
  </script>
  <style>
    body { background-color: #FAFAFA; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="font-sans antialiased min-h-screen pb-32">
  <div class="max-w-md mx-auto">
    <header class="px-6 pt-10 pb-4 flex items-center justify-between sticky top-0 bg-white/80 backdrop-blur-md z-40">
      <button onclick="goBack()" class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 bg-white shadow-sm"><i class="ph ph-arrow-left"></i></button>
      <h1 class="text-lg font-bold">Nueva Reserva</h1>
      <div class="w-10"></div>
    </header>

    <div class="px-6 mb-8">
      <div class="w-full bg-gray-200 h-1.5 rounded-full mt-4">
        <div id="progressBar" class="bg-brand-accent h-1.5 rounded-full transition-all duration-500 w-1/3"></div>
      </div>
    </div>

    <main class="px-6">
      <!-- PASO 1 -->
      <section id="step1" class="space-y-6">
        <h2 class="text-2xl font-bold text-gray-900">Selecciona un servicio</h2>
        <div class="grid grid-cols-1 gap-3" id="servicesGrid"></div>
      </section>

      <!-- PASO 2 -->
      <section id="step2" class="hidden opacity-0 translate-y-4 transition-all duration-300">
        <h2 class="text-2xl font-bold mb-6">Fecha y hora</h2>
        <div id="calendarCarousel" class="flex gap-3 overflow-x-auto no-scrollbar pb-4"></div>
        <div class="grid grid-cols-3 gap-2 mt-6" id="hoursGrid"></div>
      </section>

      <!-- PASO 3 -->
      <section id="step3" class="hidden opacity-0 translate-y-4 transition-all duration-300">
        <h2 class="text-2xl font-bold mb-4">Tus datos</h2>
        <div class="space-y-4">
          <input type="text" id="clientName" placeholder="Nombre completo" class="w-full p-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-brand-accent outline-none">
          <input type="tel" id="clientPhone" placeholder="Teléfono" class="w-full p-4 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-brand-accent outline-none">
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
            <p class="text-xs text-gray-400 font-bold uppercase mb-2">Resumen</p>
            <div class="flex justify-between font-bold"><span id="summaryService"></span><span id="summaryPrice"></span></div>
            <p id="summaryDateTime" class="text-sm text-gray-500 mt-1"></p>
          </div>
        </div>
      </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-white to-transparent">
      <button id="btnContinue" onclick="nextStep()" class="w-full bg-brand-text text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Continuar</button>
    </div>
  </div>

  <script>
    let currentStep = 1;
    let selectedService = null;
    let selectedDate = null;
    let selectedTime = null;

    function init() {
      const services = DB.getServices();
      const grid = document.getElementById('servicesGrid');
      grid.innerHTML = services.map(s => `
        <button onclick="selectService(this, ${s.id})" class="service-card text-left p-5 rounded-2xl bg-white border-2 border-transparent shadow-sm transition-all hover:border-brand-accent/30">
          <div class="flex justify-between items-center">
            <span class="font-bold text-gray-900">${s.nombre}</span>
            <span class="font-bold text-brand-accent">$${s.precio.toLocaleString('es-CL')}</span>
          </div>
        </button>
      `).join('');
    }

    function selectService(el, id) {
      document.querySelectorAll('.service-card').forEach(c => c.classList.remove('border-brand-accent', 'bg-emerald-50'));
      el.classList.add('border-brand-accent', 'bg-emerald-50');
      selectedService = DB.getServices().find(s => s.id === id);
    }

    function renderCalendar() {
      const carousel = document.getElementById('calendarCarousel');
      const today = new Date();
      const days = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
      carousel.innerHTML = '';
      
      for(let i=0; i<14; i++) {
        let d = new Date(); d.setDate(today.getDate() + i);
        let dStr = d.toISOString().split('T')[0];
        let isWorkDay = DB.getSettings().diasLaborales.includes(d.getDay());
        
        carousel.innerHTML += `
          <button onclick="handleDateClick(this, '${dStr}')" class="day-btn flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center border transition-all ${!isWorkDay ? 'opacity-20 pointer-events-none' : 'bg-white border-gray-100'}" ${!isWorkDay ? 'disabled' : ''}>
            <span class="text-[10px] uppercase font-bold text-gray-400">${days[d.getDay()]}</span>
            <span class="text-xl font-bold">${d.getDate()}</span>
          </button>`;
      }
    }

    function handleDateClick(btn, dateStr) {
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('bg-brand-text', 'text-white'));
      btn.classList.add('bg-brand-text', 'text-white');
      selectedDate = dateStr;
      selectedTime = null;
      renderHours();
    }

    function renderHours() {
      const grid = document.getElementById('hoursGrid');
      const hours = DB.getAvailableHours(selectedDate, selectedService.duracion);
      grid.innerHTML = hours.map(h => `
        <button onclick="selectTime(this, '${h.time}')" ${h.occupied ? 'disabled' : ''} class="p-3 rounded-xl border text-sm font-bold transition-all ${h.occupied ? 'bg-gray-100 text-gray-300 border-transparent' : 'bg-white border-gray-200 hover:border-brand-accent'}">
          ${h.time}
        </button>
      `).join('');
    }

    function selectTime(btn, time) {
      document.querySelectorAll('#hoursGrid button').forEach(b => b.classList.remove('bg-brand-accent', 'text-white', 'border-transparent'));
      btn.classList.add('bg-brand-accent', 'text-white', 'border-transparent');
      selectedTime = time;
    }

    function nextStep() {
      if(currentStep === 1) {
        if(!selectedService) return alert("Selecciona un servicio");
        renderCalendar();
        transition(1, 2);
      } else if(currentStep === 2) {
        if(!selectedTime) return alert("Selecciona una hora");
        document.getElementById('summaryService').innerText = selectedService.nombre;
        document.getElementById('summaryPrice').innerText = `$${selectedService.precio.toLocaleString('es-CL')}`;
        document.getElementById('summaryDateTime').innerText = `${selectedDate} a las ${selectedTime}`;
        transition(2, 3);
        document.getElementById('btnContinue').innerText = "Confirmar Reserva";
      } else if(currentStep === 3) {
        const name = document.getElementById('clientName').value;
        const phone = document.getElementById('clientPhone').value;
        if(!name || !phone) return alert("Completa tus datos");
        
        DB.saveBooking({
          fecha: selectedDate,
          hora: selectedTime,
          clienteNombre: name,
          clienteTelefono: phone,
          servicioNombre: selectedService.nombre,
          duracionServicio: selectedService.duracion
        });
        alert("¡Cita reservada con éxito!");
        window.location.href = 'index.html';
      }
    }

    function transition(from, to) {
      const f = document.getElementById(`step${from}`);
      const t = document.getElementById(`step${to}`);
      f.classList.add('opacity-0', '-translate-y-4');
      setTimeout(() => {
        f.classList.add('hidden');
        t.classList.remove('hidden');
        setTimeout(() => t.classList.remove('opacity-0', 'translate-y-4'), 50);
        currentStep = to;
        document.getElementById('progressBar').style.width = (to * 33.3) + '%';
      }, 300);
    }

    function goBack() {
        if(currentStep > 1) window.location.reload();
        else window.history.back();
    }

    window.onload = init;
  </script>
</body>
</html>
